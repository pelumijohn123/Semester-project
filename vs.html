<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>VS Code Clone</title>
  <link rel="stylesheet" href="vs.css">
</head>
<body> 
  <script src="vs.js"></script>

<div class="app">

  
  <div class="activity-bar">
    <div class="icon active">📁</div>
    <div class="icon">🔍</div>
    <div class="icon">🌿</div>
    <div class="icon">🐞</div>
    <div class="icon">⚙️</div>
  </div>

  <div class="sidebar">
    <div class="sidebar-header">EXPLORER</div>
    <div class="file">index.html</div>
    <div class="file">styles.css</div>
    <div class="file">app.js</div>
  </div>


  <div class="main">

 
    <div class="title-bar">VS Code </div>


    <div class="tabs">
      <div class="tab active">index.html <span>×</span></div>
      <div class="tab">styles.css <span>×</span></div>
    </div>


    <div class="editor">
      <div class="line-numbers">
        <span>1</span>
        <span>2</span>
        <span>3</span>
        <span>4</span>
      </div>

      <div class="code">
<pre>
&lt;h1&gt;Hello World&lt;/h1&gt;
&lt;p&gt;VS Code &lt;/p&gt;
</pre>
      </div>
    </div>

    <div class="status-bar">
      <div class="left">
        <span>main</span>
        <span>⚠ 0</span>
      </div>
      <div class="right">
        <span>Ln 1, Col 1</span>
        <span>Spaces: 2</span>
        <span>UTF-8</span>
        <span>HTML</span>
      </div>
    </div>

  </div>

</div>
<script src="other.js"></script>
</body>
</html>
